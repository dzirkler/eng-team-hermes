# Holographic memory (2026-07-04): shared "eng knowledge" store, see
# profiles/debugger/config.yaml for the full writeup (activation key,
# concurrency findings, why this six-profile grouping). `memory` is
# already in platform_toolsets.cli below, which is what actually gates
# fact_store/fact_feedback tools — no change needed there.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    db_path: /opt/data/shared/eng_memory_store.db
    auto_extract: false
    default_trust: 0.5

# Implementation Engineer worker profile config.yaml — see
# profiles/orchestrator/config.yaml for the full explanation of
# platform_toolsets vs. hooks. Split off from the former
# `full-stack-engineer` profile per docs/temp/V3-Supplement-Model-and-Key-Binding.md
# §3/§5: this profile handles well-defined Implement-phase tasks only
# (scope already broken down by senior-engineer's Plan/Tasks work).
# Model raised from cheap-tier GLM-4.7 to flagship GLM-5.2 (2026-07-04) to
# match senior-engineer — the Implement/Plan-Tasks split is now purely a
# scope/routing distinction, not a cost-tier one. Ad-hoc troubleshooting,
# fixes, and review stay on `senior-engineer`. Same full read/write/terminal
# access as the old full-stack-engineer — no write-blocking hook here, only
# the team-wide no_merge_guard.js.

model:
  provider: zai
  # reasoning_effort=high (2026-07-05, V3 reasoning-level pass) — keeps the
  # 5.2 capability floor for pre-scoped Implement work while cutting the
  # max-default cost; this + senior-engineer's max is the "deep vs lean"
  # engineer split (same model, different effort). Baked into the
  # glm-5.2-coding-high model alias's own LiteLLM-side extra_body rather
  # than agent.reasoning_effort — see profiles/senior-engineer/config.yaml
  # for the full writeup on why (unresolved LiteLLM zai-provider bug).
  default: glm-5.2-coding-high
  api_key_env: Z_AI_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search
    - terminal
    - code_execution

skills:
  external_dirs:
    - /opt/curated-skills
    # Version-pinned speckit-* skills (speckit/README.md); not inherited from
    # root config (docs/MOUNTS.md), so listed per-profile. This profile owns
    # the Implement stage → speckit-implement, speckit-converge.
    - /opt/speckit-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}
