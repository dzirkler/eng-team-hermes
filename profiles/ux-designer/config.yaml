# Holographic memory (2026-07-04): isolated (no shared db_path) — see
# profiles/product-manager/config.yaml for the isolation rationale and
# profiles/debugger/config.yaml for the full writeup. Kept isolated as the
# safe default absent a signal that UI work is a large enough share of
# this team's output to justify design-brief recall leaking into the
# engineering store; revisit if that changes.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    auto_extract: false
    default_trust: 0.5

# UX Designer worker profile config.yaml — see profiles/orchestrator/config.yaml
# for the full explanation of platform_toolsets vs. hooks. Needs file
# read/write for design-brief docs but no shell/code-execution access.

model:
  provider: zai
  # reasoning_effort=high (2026-07-05, V3 reasoning-level pass) — design
  # briefs / UX flow are structured-creative work, not algorithmic. Baked
  # into the glm-5.2-coding-high model alias's own LiteLLM-side extra_body
  # rather than agent.reasoning_effort — see
  # profiles/senior-engineer/config.yaml for the full writeup on why
  # (unresolved LiteLLM zai-provider bug).
  default: glm-5.2-coding-high
  # CORRECTED 2026-07-06 (see config/config.yaml's model.api_key_env comment
  # for the full incident writeup): was Z_AI_API_KEY on the assumption this
  # field is decorative, but a real blocked-Kanban-card 401 on resume proved
  # some resolution path does honor it. Set to GLM_API_KEY defensively.
  api_key_env: GLM_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search

skills:
  external_dirs:
    - /opt/curated-skills
  # Agent-authored (Tier 2) skill writes commit immediately — no human
  # approval gate. Scoped only to this profile's own writable skills dir;
  # the curated external_dirs above stay read-only regardless.
  write_approval: false

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
    - command: /opt/hooks/no_kanban_escalation_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}

# Discord gateway platform (2026-07-05) — explicitly disabled. Only
# profiles/orchestrator/config.yaml should be Discord-facing (the team's
# single-point-of-contact design — specialists never reach Damon directly).
# DISCORD_BOT_TOKEN is a container-wide env var and every profile runs its
# own gateway process, so without this override this profile would also
# auto-connect to the same bot and race the orchestrator's connection on
# every inbound message — confirmed live as the actual cause of a duplicate-
# thread/rate-limit incident between the orchestrator and default profiles
# before this flag existed. See config/config.yaml's matching note.
platforms:
  discord:
    enabled: false
