# Holographic memory (2026-07-04): deliberately NOT given an external
# memory provider — same reasoning as omitting the `memory` toolset below
# (see profiles/debugger/config.yaml for the team-wide writeup). Also
# disabling BUILT-IN memory injection here: `memory_enabled` defaults to
# true in the schema regardless of the `memory` toolset (it governs
# system-prompt context injection, a separate mechanism from the toolset
# gate — confirmed in hermes_cli/config.py's DEFAULT_CONFIG), so without
# this override this profile's own accumulated MEMORY.md/USER.md would
# still get injected at session start, undermining the "genuinely fresh
# read with no prior knowledge" design intent below.
memory:
  memory_enabled: false

# Independent Reviewer worker profile config.yaml — see
# profiles/orchestrator/config.yaml for the full explanation of
# platform_toolsets vs. hooks. Deliberately omits the `memory` toolset
# entirely (not just hooked off) — this profile's entire value is a
# genuinely fresh read with no access to the team's prior knowledge/
# decisions, so there's no legitimate use case to leave that door open,
# same reasoning as orchestrator omitting terminal/code_execution.
#
# No no_write_guard.js hook: this profile needs to write
# specs/NNN-*/review-log.md, its only permitted write. There is no
# per-file allow-list mechanism in Hermes's toolset schema (same gap noted
# in other profiles' configs), so "review-log.md only" is enforced
# behaviorally per SOUL.md, not mechanically — don't rely on the config
# alone to stop this profile from editing spec.md/plan.md/tasks.md
# directly; the discipline is in the persona instructions.

model:
  provider: zai
  # Flagship tier per docs/temp/V3-Supplement-Model-and-Key-Binding.md §5 —
  # cross-artifact consistency review is reasoning-heavy work.
  # reasoning_effort=max (2026-07-05, V3 reasoning-level pass) — last
  # automated gate before CP2, must catch subtle gaps; don't starve it.
  # Baked into the glm-5.2-coding-max model alias's own LiteLLM-side
  # extra_body rather than agent.reasoning_effort — see
  # profiles/senior-engineer/config.yaml for the full writeup on why
  # (unresolved LiteLLM zai-provider bug).
  default: glm-5.2-coding-max
  api_key_env: Z_AI_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - file
    - skills
    - todo
    - session_search

skills:
  external_dirs:
    - /opt/curated-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}
