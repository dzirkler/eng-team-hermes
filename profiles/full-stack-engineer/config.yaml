# Full Stack Engineer worker profile config.yaml — see
# profiles/orchestrator/config.yaml for the full explanation of
# platform_toolsets vs. hooks. This is the one profile that needs full
# read/write/execute access — no write-blocking hook here, only the
# team-wide no_merge_guard.js.

model:
  provider: zai
  default: glm-5.2
  api_key_env: Z_AI_API_KEY

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search
    - terminal
    - code_execution

skills:
  external_dirs:
    - /opt/curated-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
