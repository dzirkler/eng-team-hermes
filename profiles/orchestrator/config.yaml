# Holographic memory (2026-07-04): shared "eng knowledge" store, see
# profiles/debugger/config.yaml for the full writeup (activation key,
# concurrency findings, why this six-profile grouping). `memory` is
# already in platform_toolsets.cli below, which is what actually gates
# fact_store/fact_feedback tools — no change needed there.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    db_path: /opt/data/shared/eng_memory_store.db
    auto_extract: false
    default_trust: 0.5

# Orchestrator worker profile config.yaml — seeded by bootstrap.ps1/.sh into
# /opt/data/profiles/orchestrator/config.yaml inside the container (real
# per-profile config path, confirmed 2026-07-02 against a live container:
# `hermes profile create` produces <data-root>/profiles/<name>/{SOUL.md,
# profile.yaml, config.yaml?}. profile.yaml there is NOT this file — it's a
# separate, auto-generated {description, description_auto} metadata file
# used by the kanban decomposer, set via `hermes profile describe`, never
# hand-authored here).
#
# Guardrail design (confirmed against hermes_cli/config.py + tools/*.py
# source, not docs): there is no fine-grained "toolsets:" allow-list key.
# Two real, complementary mechanisms compose into "orchestrator never
# writes code":
#   1. platform_toolsets.cli below — a literal list of enabled TOOLSET
#      names (confirmed by round-tripping `hermes tools disable X --platform
#      cli` against a live profile's config.yaml). Coarse: a whole toolset
#      is on or off, no sub-tool split. "file" is one toolset covering
#      read_file/write_file/patch/search_files together, so it must stay
#      enabled here (orchestrator needs read_file/search_files to read spec/
#      plan/tasks artifacts for gating and decomposition) rather than removed.
#   2. hooks.pre_tool_call below — matches on the real per-tool names
#      within an enabled toolset. no_write_guard.js blocks write_file/patch
#      specifically, leaving read_file/search_files usable. This is the
#      only mechanism fine-grained enough for "read yes, write no."
#
# terminal and code_execution are omitted from platform_toolsets.cli
# entirely — the orchestrator coordinates via Kanban tool calls, not shell
# commands, so there's no legitimate use case to leave a hole for.
#
# MCP servers are a SEPARATE gate from platform_toolsets, and were a real
# gap until 2026-07-04: confirmed in hermes_cli/tools_config.py that
# "MCP servers are expected to be available on all platforms by default" —
# omitting terminal/code_execution above does nothing to stop orchestrator
# from calling GitHub MCP tools directly (create_pull_request, push_files,
# delete_file, etc.), which contradicts "never writes code or files
# directly" just as much as a shell command would. hooks/no_merge_guard.js
# blocks merge/close specifically (team-wide, all profiles), but nothing
# else was scoped.
#
# Fix: mcp_servers.<name>.tools.include is a real fine-grained allow-list
# (distinct from the coarse platform_toolsets), and — because managed-scope
# (config/managed.yaml, /etc/hermes/config.yaml) deep-merges ON TOP of this
# file rather than replacing it — this profile can narrow just the `tools`
# leaf under mcp_servers.github while still inheriting url/headers/type
# from the managed layer. Scoped to read-only issue-lookup tools: enough
# for the orchestrator to reference real issue context when framing Kanban
# cards, with no path to any GitHub mutation. Anything beyond this (opening
# PRs, pushing files, editing issues) is a Kanban task delegated to
# project-manager/senior-engineer, which have the full github MCP toolset.
mcp_servers:
  github:
    tools:
      include:
        - issue_read
        - list_issues
        - search_issues

model:
  provider: zai
  # Flagship tier per docs/temp/V3-Supplement-Model-and-Key-Binding.md §5 —
  # was glm-5-turbo (a stale/invented id from before the model split was
  # decided), corrected to the real flagship id used elsewhere in this repo.
  # reasoning_effort=high (2026-07-05, V3 reasoning-level pass) — transcribes
  # tasks.md's graph, gates, and checkpoints: judgment-heavy but not deep
  # design, and runs often, so high (not max) is the efficiency lever.
  # Baked into the glm-5.2-coding-high model alias's own LiteLLM-side
  # extra_body rather than agent.reasoning_effort — see
  # profiles/senior-engineer/config.yaml for the full writeup on why
  # (unresolved LiteLLM zai-provider bug).
  default: glm-5.2-coding-high
  api_key_env: Z_AI_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Per-profile override of the schema default (agent.max_turns: 90, hermes_cli/
# config.py DEFAULT_CONFIG) — confirmed live 2026-07-03: a kanban worker task
# failed with "Iteration budget exhausted (90/90)" on a long-running card.
# 90 is the tool-calling-iteration cap PER TURN (not the same as a card's
# goal_max_turns, which bounds a goal-mode worker's number of turns) and is
# too tight for genuinely long implementation/debug/test loops. Raised
# uniformly across all worker profiles rather than per-profile, since any
# specialist can end up on a long card.
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search
    - clarify
    # NOTE: the `delegation` (delegate_task in-session subagent) toolset is
    # deliberately NOT enabled. Team-level fan-out is done the Hermes-native
    # way — the orchestrator decomposes work into Kanban cards and the
    # gateway dispatcher spawns each assigned profile as its own OS process
    # (see SOUL.md + docs/MOUNTS.md). delegate_task is a separate, in-session
    # mechanism for a single worker to parallelize sub-steps within one run;
    # the orchestrator doesn't need it (and the official docs restrict
    # orchestrator profiles to coordination toolsets).

# Confirmed live 2026-07-04: this is NOT the same key as platform_toolsets
# above, and listing "kanban" there does NOT make kanban_create/
# kanban_list/kanban_unblock actually callable. tools/kanban_tools.py's
# _check_kanban_mode / _check_kanban_orchestrator_mode gate every kanban
# tool on EITHER `HERMES_KANBAN_TASK` being set (true for a
# dispatcher-spawned worker mid-task) OR this separate top-level
# `toolsets:` list containing "kanban" (true for a profile that IS the
# board-router, i.e. orchestrator, run ad-hoc via `hermes chat`, not
# spawned by the dispatcher for a single task). Without this key, an
# ad-hoc orchestrator session had kanban tools listed as "enabled" in the
# toolset-name resolution step but every actual call was stripped at
# runtime with "check failed" — which is exactly what surfaced as
# orchestrator correctly reporting it had no real way to delegate.
toolsets:
  - kanban

skills:
  external_dirs:
    - /opt/curated-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
    - command: /opt/hooks/no_write_guard.js
      timeout: 10

# Discord gateway platform (2026-07-05) — this is the ONE profile that
# should be Discord-facing, per the single-point-of-contact design already
# established above (specialists never reach Damon directly; orchestrator
# is the only profile with kanban_block). See config/config.yaml's
# `platforms.discord.enabled: false` for why every OTHER profile explicitly
# opts out — DISCORD_BOT_TOKEN is a container-wide env var, and every
# profile runs its own gateway process, so without an explicit per-profile
# flag every one of them would try to connect as the same bot and race on
# inbound messages (confirmed live: this exact collision happened between
# this profile and the default/root one before the flag was added).
#
# `platforms.discord.enabled` (gateway/config.py's PlatformConfig) is a
# separate config surface from the `discord:` behavior block below (which
# feeds the plugin's own auto_thread/require_mention/etc. settings via
# plugins/platforms/discord/adapter.py) — both are needed.
platforms:
  discord:
    enabled: true

discord:
  require_mention: true          # only respond when @mentioned in a server channel
  auto_thread: true              # new thread per @mention = new isolated session
  thread_require_mention: false  # single-bot setup — no multi-bot ack-loop risk

# Discord defaults to gateway/display_config.py's _TIER_HIGH (tool_progress:
# "all"), which posts every tool call (e.g. "kanban_list...") as a visible
# line — confirmed live 2026-07-05 after seeing exactly that breadcrumb in
# a real response. Overridden per-platform here rather than globally so the
# CLI (docker exec) keeps full tool visibility for debugging.
display:
  platforms:
    discord:
      tool_progress: off               # no tool-call breadcrumbs
      interim_assistant_messages: true # keep mid-turn "let me check..." chatter

# Confirmed live 2026-07-05: tools/kanban_tools.py's _maybe_auto_subscribe
# fires on EVERY kanban_create call made from a gateway session (no
# distinction between a root/checkpoint task and a routine worker task),
# gated only by this flag (default true). Since the orchestrator gets
# re-spawned on its own checkpoint cards and posts a real, formatted
# response into the same thread once dispatch completes, the raw
# "[team] @profile Kanban t_xxx done — ..." notifier line duplicated that
# response for every single worker task, not just the checkpoint. Disabled
# here so only the orchestrator's own synthesized summary reaches Damon.
#
# Tradeoff (accepted): this notifier was also the one automatic signal if
# the orchestrator's own re-engagement ever stalls/fails to re-spawn — with
# it off, that failure mode is silent unless the Kanban dashboard board is
# checked manually.
kanban:
  auto_subscribe_on_create: false
