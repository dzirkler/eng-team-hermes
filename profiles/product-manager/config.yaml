# Holographic memory (2026-07-04): isolated (no shared db_path) — this
# profile's requirement/process notes would just add noise to the shared
# "eng knowledge" store used by orchestrator/senior-engineer/
# implementation-engineer/quality-engineer/debugger/qa-analyst (see
# profiles/debugger/config.yaml for the full writeup). Omitting db_path
# means it resolves to this profile's own $HERMES_HOME (confirmed live:
# get_profile_dir() gives each named profile a distinct directory, and an
# isolation test — two throwaway profiles, fact added under one, searched
# from the other — found zero cross-profile leakage). `memory` is already
# in platform_toolsets.cli below, which is what gates fact_store/
# fact_feedback — no change needed there.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    auto_extract: false
    default_trust: 0.5

# Product Manager worker profile config.yaml — see profiles/orchestrator/config.yaml
# for the full explanation of platform_toolsets vs. hooks. This profile
# reads context (file toolset, read-only via no_write_guard.js) and
# researches (web toolset) but never edits files or runs shell commands —
# requirements/spec artifacts are dispatched to product-manager, not
# written by it directly (SDD generation is sub-delegated, reviewed, and
# presented at a checkpoint by the orchestrator).

model:
  provider: zai
  # reasoning_effort=high (2026-07-05, V3 reasoning-level pass) — mostly
  # spec authoring, structured but not the deepest reasoning role. Caveat:
  # this profile also owns Analyze (SDD stage 7) — bump to max if it
  # under-analyzes there. Baked into the glm-5.2-coding-high model alias's
  # own LiteLLM-side extra_body rather than agent.reasoning_effort — see
  # profiles/senior-engineer/config.yaml for the full writeup on why
  # (unresolved LiteLLM zai-provider bug).
  default: glm-5.2-coding-high
  api_key_env: Z_AI_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search
    - clarify

skills:
  external_dirs:
    - /opt/curated-skills
    # Version-pinned speckit-* skills (speckit/README.md). Per-profile config
    # does NOT inherit root config/config.yaml's external_dirs (docs/MOUNTS.md),
    # so each profile that runs SDD stages must list this mount itself. This
    # profile owns Constitution/Specify/Clarify/Analyze → speckit-constitution,
    # speckit-specify, speckit-clarify, speckit-analyze.
    - /opt/speckit-skills
  # Agent-authored (Tier 2) skill writes commit immediately — no human
  # approval gate. Scoped only to this profile's own writable skills dir;
  # the curated/speckit external_dirs above stay read-only regardless.
  write_approval: false

# NOTE: no_write_guard.js was REMOVED here (2026-07-03). In the Hermes-native
# model the orchestrator force-loads speckit-constitution/specify/clarify/
# analyze into THIS worker (via kanban --skill), and those procedures WRITE
# their own artifacts (constitution.md, spec.md, ...). A read-only PM can't run
# them — that only worked in V2, which sub-delegated generation to a separate
# writer. So this profile now authors its own SDD artifacts. Guardrails that
# remain: no `terminal`/`code_execution` toolset (can't run or commit code) and
# no_merge_guard.js (can't merge). Write access is unscoped (Hermes `file` has
# no path-glob), so "PM writes only spec-folder artifacts, never code" is
# discipline (see SOUL.md), the same accepted gap the engineer profiles carry.
hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
    - command: /opt/hooks/no_kanban_escalation_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}

# Discord gateway platform (2026-07-05) — explicitly disabled. Only
# profiles/orchestrator/config.yaml should be Discord-facing (the team's
# single-point-of-contact design — specialists never reach Damon directly).
# DISCORD_BOT_TOKEN is a container-wide env var and every profile runs its
# own gateway process, so without this override this profile would also
# auto-connect to the same bot and race the orchestrator's connection on
# every inbound message — confirmed live as the actual cause of a duplicate-
# thread/rate-limit incident between the orchestrator and default profiles
# before this flag existed. See config/config.yaml's matching note.
platforms:
  discord:
    enabled: false
