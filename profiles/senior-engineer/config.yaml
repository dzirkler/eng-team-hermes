# Holographic memory (2026-07-04): shared "eng knowledge" store, see
# profiles/debugger/config.yaml for the full writeup (activation key,
# concurrency findings, why this six-profile grouping). `memory` is
# already in platform_toolsets.cli below, which is what actually gates
# fact_store/fact_feedback tools — no change needed there.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    db_path: /opt/data/shared/eng_memory_store.db
    auto_extract: false
    default_trust: 0.5

# Senior Engineer worker profile config.yaml — see
# profiles/orchestrator/config.yaml for the full explanation of
# platform_toolsets vs. hooks. Split off from the former
# `full-stack-engineer` profile per docs/temp/V3-Supplement-Model-and-Key-Binding.md
# §3/§5: this profile owns Plan/Tasks + ad-hoc troubleshooting, fixes, and
# review — flagship-tier reasoning work, GLM-5.2. Well-defined Implement-phase
# tasks route to the cheap-tier `implementation-engineer` profile instead.
# Same full read/write/terminal access as the old full-stack-engineer — no
# write-blocking hook here, only the team-wide no_merge_guard.js.

model:
  provider: zai
  # Reasoning-effort pinning (2026-07-05, V3 profile reasoning-level pass):
  # `default` points at a per-profile LiteLLM virtual model
  # (glm-5.2-coding-<level>) with `thinking`/`reasoning_effort` baked into a
  # STATIC `extra_body` in that model's own litellm_params, not sent by
  # Hermes per-request. This is deliberate, not stylistic: Hermes's zai
  # provider still hits an unresolved upstream LiteLLM bug
  # (github.com/BerriAI/litellm issue #19923, fix PR #31085 open/unmerged as
  # of 2026-07-05) where `thinking`/`reasoning_effort` sent as top-level
  # request params crash with "AsyncCompletions.create() got an unexpected
  # keyword argument 'thinking'". Baking the level into the model alias
  # sidesteps that path entirely (confirmed live via direct proxy calls and
  # through this container's own `hermes chat`, both showing real
  # `reasoning_content`/`reasoning_tokens`). Consequently `agent.reasoning_effort`
  # must stay UNSET on every zai/GLM profile — setting it would make Hermes
  # send its own conflicting top-level param and hit the crash again.
  # senior-engineer -> glm-5.2-coding-max (thinking enabled, reasoning_effort
  # max): Plan/Tasks, whole-repo architecture, ad-hoc fixes, swarm
  # synthesizer — the deepest-reasoning role, paired with
  # implementation-engineer's glm-5.2-coding-high as the "deep vs lean"
  # engineer split (same model, different effort). See each profile's own
  # config.yaml for its assigned level; this comment is the one full
  # writeup.
  default: glm-5.2-coding-max
  api_key_env: Z_AI_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search
    - terminal
    - code_execution
    # 2026-07-05: added so this profile can self-verify a frontend fix
    # (screenshot/click/console-check a running dev server) before handoff,
    # instead of only finding out from qa-analyst's later pass. Backed by
    # Hermes's native agent-browser tool, which has Chromium baked into the
    # base image already (confirmed live: no extra provisioning needed) —
    # NOT the separate @playwright/mcp npm server, which independently
    # tries to download its own browser at runtime and is what actually
    # caused the "environment-blocked" Chromium/timeout report this fixes.
    # This is a sanity-check tool, not a replacement for qa-analyst's
    # independent validation pass — see SOUL.md's scoped-testing note for
    # the parallel guidance on not duplicating quality-engineer's job too.
    - browser

skills:
  external_dirs:
    - /opt/curated-skills
    # Version-pinned speckit-* skills (speckit/README.md); not inherited from
    # root config (docs/MOUNTS.md), so listed per-profile. This profile owns
    # Plan/Tasks (+ ad-hoc implement/review) → speckit-plan, speckit-tasks,
    # speckit-implement.
    - /opt/speckit-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}

# Discord gateway platform (2026-07-05) — explicitly disabled. Only
# profiles/orchestrator/config.yaml should be Discord-facing (the team's
# single-point-of-contact design — specialists never reach Damon directly).
# DISCORD_BOT_TOKEN is a container-wide env var and every profile runs its
# own gateway process, so without this override this profile would also
# auto-connect to the same bot and race the orchestrator's connection on
# every inbound message — confirmed live as the actual cause of a duplicate-
# thread/rate-limit incident between the orchestrator and default profiles
# before this flag existed. See config/config.yaml's matching note.
platforms:
  discord:
    enabled: false
