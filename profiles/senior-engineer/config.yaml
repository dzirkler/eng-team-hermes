# Senior Engineer worker profile config.yaml — see
# profiles/orchestrator/config.yaml for the full explanation of
# platform_toolsets vs. hooks. Split off from the former
# `full-stack-engineer` profile per docs/temp/V3-Supplement-Model-and-Key-Binding.md
# §3/§5: this profile owns Plan/Tasks + ad-hoc troubleshooting, fixes, and
# review — flagship-tier reasoning work, GLM-5.2. Well-defined Implement-phase
# tasks route to the cheap-tier `implementation-engineer` profile instead.
# Same full read/write/terminal access as the old full-stack-engineer — no
# write-blocking hook here, only the team-wide no_merge_guard.js.

model:
  provider: zai
  default: glm-5.2
  api_key_env: Z_AI_API_KEY
  # Coding Plan endpoint (2026-07-03) — same Z_AI_API_KEY works against
  # both endpoints; see config/config.yaml for full rationale.
  base_url: https://api.z.ai/api/coding/paas/v4

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - web
    - skills
    - todo
    - session_search
    - terminal
    - code_execution

skills:
  external_dirs:
    - /opt/curated-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
