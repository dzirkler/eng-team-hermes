# Debugger worker profile config.yaml — see profiles/orchestrator/config.yaml
# for the full explanation of platform_toolsets vs. hooks. Needs `terminal`
# and `code_execution` to run existing tests / reproduce bugs, but
# `write_file`/`patch` are mechanically blocked — this profile diagnoses,
# it never implements the fix (hands off to senior-engineer). Note:
# terminal access alone can still mutate the filesystem via shell redirects
# (`>`, `sed -i`, `tee`) — the hook only covers the two dedicated
# file-mutation tool calls, not shell-based writes. Same residual gap as
# every profile with both `terminal` and a write-blocking hook; documented
# rather than silently assumed closed.

# Holographic memory (2026-07-04): shared "eng knowledge" store with
# orchestrator/senior-engineer/implementation-engineer/quality-engineer/
# qa-analyst — activation is `memory.provider` (confirmed live against a
# running Hermes container: this is the real on/off switch, NOT a
# `plugins.hermes-memory-store.enabled` key, which doesn't exist in the
# schema). db_path is a shared file so facts co-locate across these six
# profiles (Holographic's trust-scoring/contradiction-detection only work
# when facts share a store) — independent-reviewer and the PM/PgM/
# ux-designer profiles are deliberately excluded, see their own config.yaml
# comments. `memory` is already in this profile's platform_toolsets.cli
# below, which is what actually gates the fact_store/fact_feedback tools
# (confirmed in agent/memory_manager.py's memory_provider_tools_enabled) —
# no toolset change needed here.
#
# auto_extract left false: prove signal quality before turning on
# unreviewed automatic fact extraction at session end.
#
# Concurrency (confirmed live): Holographic opens SQLite with a 10s
# busy-timeout and requests WAL mode (hermes_state.apply_wal_with_fallback),
# which is safe for steady-state concurrent writers on this bind-mount type
# (verified: PRAGMA journal_mode=WAL succeeds on /opt/data, not silently
# downgraded to DELETE as it would be on NFS/SMB/FUSE). BUT the first-ever
# touch of a not-yet-existing db_path is a real, empirically-reproduced
# race: two processes creating the file simultaneously can hit an
# *unhandled* `sqlite3.OperationalError: database is locked` during the
# initial WAL pragma (hermes_state.py's fallback only catches NFS/SMB/FUSE
# marker strings, not this one — it re-raises). Bootstrap pre-warms
# eng_memory_store.db once (see bootstrap.sh/.ps1) specifically to avoid
# six profiles racing to create it on first real use.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    db_path: /opt/data/shared/eng_memory_store.db
    auto_extract: false
    default_trust: 0.5

model:
  provider: zai
  # Flagship tier per docs/temp/V3-Supplement-Model-and-Key-Binding.md §5 —
  # was glm-5.1 (a stale id predating the model split decision), corrected
  # to the real flagship id used elsewhere in this repo.
  # reasoning_effort=max (2026-07-05, V3 reasoning-level pass) — root-cause
  # hypothesis/test loops are the reasoning-heaviest role. Baked into the
  # glm-5.2-coding-max model alias's own LiteLLM-side extra_body rather than
  # agent.reasoning_effort — see profiles/senior-engineer/config.yaml for
  # the full writeup on why (unresolved LiteLLM zai-provider bug).
  default: glm-5.2-coding-max
  # CORRECTED 2026-07-06 (see config/config.yaml's model.api_key_env comment
  # for the full incident writeup): was Z_AI_API_KEY on the assumption this
  # field is decorative, but a real blocked-Kanban-card 401 on resume proved
  # some resolution path does honor it. Set to GLM_API_KEY defensively.
  api_key_env: GLM_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

# Isolated-HOME git/gh credentials (2026-07-06) — see
# profiles/senior-engineer/config.yaml for the full writeup, including why
# `terminal.env_passthrough: [GITHUB_TOKEN]` does NOT work (unconditionally
# blocklisted — GITHUB_TOKEN/GH_TOKEN collide with the built-in "copilot"
# inference provider's own auth vars) and why bootstrap.ps1 step 5c's
# `gh auth login --with-token` (persisted into this profile's isolated
# home) is the real fix instead. This profile only reads (write_file/patch
# mechanically blocked), but `git log`/`git diff`/`git blame` etc. for
# root-cause work still need working credentials for a private remote.
terminal:
  home_mode: profile

platform_toolsets:
  cli:
    - kanban
    - file
    - memory
    - skills
    - todo
    - session_search
    - terminal
    - code_execution
    # 2026-07-05: added so this profile can visually reproduce frontend bugs
    # (screenshot, console/network state) as evidence for its root-cause
    # writeup, without expanding what it can change — write_file/patch stay
    # mechanically blocked (no_write_guard.js), this is observation-only,
    # same shape as qa-analyst's browser access. Backed by Hermes's native
    # agent-browser tool (Chromium baked into the base image already, no
    # extra provisioning) — not the separate @playwright/mcp npm server,
    # which is what actually caused the earlier "environment-blocked"
    # Chromium/timeout report this fixes.
    - browser

skills:
  external_dirs:
    - /opt/curated-skills
  # Agent-authored (Tier 2) skill writes commit immediately — no human
  # approval gate. Scoped only to this profile's own writable skills dir;
  # the curated/speckit external_dirs above stay read-only regardless.
  write_approval: false

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
    - command: /opt/hooks/no_write_guard.js
      timeout: 10
    - command: /opt/hooks/no_kanban_escalation_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}

# Discord gateway platform (2026-07-05) — explicitly disabled. Only
# profiles/orchestrator/config.yaml should be Discord-facing (the team's
# single-point-of-contact design — specialists never reach Damon directly).
# DISCORD_BOT_TOKEN is a container-wide env var and every profile runs its
# own gateway process, so without this override this profile would also
# auto-connect to the same bot and race the orchestrator's connection on
# every inbound message — confirmed live as the actual cause of a duplicate-
# thread/rate-limit incident between the orchestrator and default profiles
# before this flag existed. See config/config.yaml's matching note.
platforms:
  discord:
    enabled: false
