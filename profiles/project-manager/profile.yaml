name: project-manager
model: glm-4.7
toolsets:
  - read
  - search
  - github_mutate    # branch/draft-PR creation, gh pr ready, issue tracking
                      # — authorization ends at gh pr ready; no-merge-guard
                      # enforces the boundary regardless of this grant
