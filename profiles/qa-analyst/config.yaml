# Holographic memory (2026-07-04): shared "eng knowledge" store, see
# profiles/debugger/config.yaml for the full writeup (activation key,
# concurrency findings, why this six-profile grouping). `memory` is
# already in platform_toolsets.cli below, which is what actually gates
# fact_store/fact_feedback tools — no change needed there.
memory:
  provider: holographic

plugins:
  hermes-memory-store:
    db_path: /opt/data/shared/eng_memory_store.db
    auto_extract: false
    default_trust: 0.5

# QA Analyst worker profile config.yaml — see profiles/orchestrator/config.yaml
# for the full explanation of platform_toolsets vs. hooks. This profile
# doesn't need the `file` toolset at all — it validates through the browser
# (Hermes's native agent-browser tool, see `browser` in platform_toolsets
# below) and reports via kanban_comment, never reads source directly. Full
# toolset deny (not just a hook) is achievable here, cleaner than the
# read-only-via-hook pattern used elsewhere.
#
# 2026-07-05: removed the redundant mcp_servers.playwright block that used
# to live here (`npx -y @playwright/mcp@latest`) — root-caused as the
# actual source of the "no Chromium binary, playwright install times out"
# report: that external server does its own independent browser download
# at runtime, separate from (and redundant with) the native `browser`
# toolset below, which already has Chromium baked into the base image with
# zero extra provisioning (confirmed live). It was also very likely dead
# code already: this file had TWO top-level `mcp_servers:` keys (this one,
# and the opt-in stub further down) — invalid YAML that most parsers
# resolve by silently keeping only the last one, so the stub below may
# have been silently overriding this block all along.

model:
  provider: zai
  # Cheap tier per docs/temp/V3-Supplement-Model-and-Key-Binding.md §5 —
  # was glm-5.2 (flagship), corrected: this profile's task is well-defined
  # (run the app, report pass/fail), fits comfortably in GLM-4.7's 200K.
  # thinking=on (2026-07-05, V3 reasoning-level pass) — GLM-4.7's forced
  # interleaved thinking before every tool call aids stability for agentic
  # Playwright validation. No reasoning_effort dial on 4.7 (5.2+ only).
  # Baked into the glm-4.7-coding-on model alias's own LiteLLM-side
  # extra_body rather than agent.reasoning_effort — see
  # profiles/senior-engineer/config.yaml for the full writeup on why
  # (unresolved LiteLLM zai-provider bug).
  default: glm-4.7-coding-on
  api_key_env: Z_AI_API_KEY
  # Routed through the team's LiteLLM proxy (2026-07-03) for per-team
  # token tracking, not directly at Z.AI's Coding Plan endpoint anymore.
  # GLM_BASE_URL + GLM_API_KEY in docker-compose.yml are what's actually
  # load-bearing; see config/config.yaml for full rationale.
  base_url: https://litellm.home.zirkler.com/v1

# Raised from the schema default of 90 — see profiles/orchestrator/config.yaml
# for the full rationale (long-running cards were hitting "Iteration budget
# exhausted (90/90)").
agent:
  max_turns: 300

platform_toolsets:
  cli:
    - kanban
    - memory
    - skills
    - todo
    - session_search
    - browser

skills:
  external_dirs:
    - /opt/curated-skills
  write_approval: true

hooks:
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10

# Opt-in stub for config/managed.yaml's mcp_servers (github, playwright,
# firecrawl, etc.) — confirmed live 2026-07-04: Hermes only pulls in the
# managed-scope MCP servers for a profile whose OWN config.yaml has a
# NON-EMPTY mcp_servers key (an empty `mcp_servers: {}` does NOT count —
# tested directly). Without this stub every profile except orchestrator
# (which has its own real mcp_servers.github override) had ZERO MCP tools
# despite managed.yaml listing 10 servers — a real gap from the original
# MCP port. The actual server definitions (url/command/env) still come
# from managed.yaml; this key only needs to be present to flip the
# per-profile "include every globally enabled MCP server" default on.
mcp_servers:
  zread: {}

# Discord gateway platform (2026-07-05) — explicitly disabled. Only
# profiles/orchestrator/config.yaml should be Discord-facing (the team's
# single-point-of-contact design — specialists never reach Damon directly).
# DISCORD_BOT_TOKEN is a container-wide env var and every profile runs its
# own gateway process, so without this override this profile would also
# auto-connect to the same bot and race the orchestrator's connection on
# every inbound message — confirmed live as the actual cause of a duplicate-
# thread/rate-limit incident between the orchestrator and default profiles
# before this flag existed. See config/config.yaml's matching note.
platforms:
  discord:
    enabled: false
