services:
  hermes-agent:
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAME:-eng-team}-hermes
    restart: unless-stopped
    command: gateway run
    # NOTE (corrected 2026-07-02): image is on Docker Hub, NOT ghcr.io — the
    # earlier ghcr.io/nousresearch/hermes-agent reference was wrong and
    # caused "unauthorized" pulling it. Data root is /opt/data, NOT
    # /home/node/.hermes — every mount path below was corrected to match
    # the verified docs at https://hermes-agent.nousresearch.com/docs/user-guide/docker

    shm_size: "1g"   # required for Playwright/browser tools per official docs

    ports:
      - "127.0.0.1:8642:8642"   # gateway / OpenAI-compatible API
      - "127.0.0.1:9119:9119"   # dashboard — see dashboard auth note below

    environment:
      # Needed so config/config.yaml's terminal.cwd: /workspace/${PROJECT_NAME}
      # actually expands inside the container — PROJECT_NAME was previously
      # only a compose-file-level substitution (container name, volume
      # path), never forwarded into the container's own env. Same default
      # fallback as the volumes section below, for consistency.
      - PROJECT_NAME=${PROJECT_NAME:-project}
      # Z_AI_API_KEY stays the REAL Z.AI key — do NOT replace it with the
      # LiteLLM virtual key. config/config.yaml's mcp_servers.zai-vision and
      # zai-web-search reference ${Z_AI_API_KEY} directly against real Z.AI
      # endpoints (image analysis, web search) that are NOT proxied through
      # LiteLLM; overwriting this var would break those two MCP tools.
      - Z_AI_API_KEY=${Z_AI_API_KEY}
      # The main chat model's LiteLLM virtual key (2026-07-03, per-team
      # token-usage tracking). Hermes's built-in "zai" provider resolves its
      # API key from hermes_cli/auth.py's PROVIDER_REGISTRY["zai"], whose
      # api_key_env_vars tuple is (GLM_API_KEY, ZAI_API_KEY, Z_AI_API_KEY) —
      # confirmed by reading resolve_api_key_provider_credentials() /
      # _resolve_api_key_provider_secret(), which try each in that order and
      # return the first one that's set. Each profile's config.yaml
      # `model.api_key_env` field is NEVER consulted for this resolution
      # (confirmed live: pointing it at a nonexistent env var did not break
      # anything — the call still succeeded via Z_AI_API_KEY). So GLM_API_KEY
      # — checked first, before Z_AI_API_KEY — is the clean way to give the
      # main chat model a different credential (the LiteLLM virtual key)
      # without disturbing Z_AI_API_KEY's separate MCP-tool use above.
      - GLM_API_KEY=${GLM_API_KEY}
      # Pin the base URL explicitly. hermes_cli/runtime_provider.py's
      # generic API-key-provider branch does honour model.base_url from
      # config.yaml when model.provider matches (confirmed by reading
      # resolve_runtime_provider(): cfg_base_url wins over the probed
      # creds.base_url whenever cfg_provider == provider) — but
      # _resolve_zai_base_url() is still unconditionally called first and
      # runs a background Z.AI endpoint auto-probe (global/cn/coding-global/
      # coding-cn) whenever this env var is unset, logged as "Z.AI:
      # auto-detected endpoint ...". In observed live testing before this
      # var was set, some code path used that probed result instead of
      # model.base_url in 1 of 4 calls. GLM_BASE_URL is checked before any
      # probing (`if env_override: return env_override`) and eliminates the
      # auto-probe entirely regardless of what URL it holds — confirmed
      # live: 9+ consecutive calls after setting it show zero auto-detect
      # log lines. This also makes it the correct way to point the main
      # chat model at a non-Z.AI endpoint like a LiteLLM proxy — now pointed
      # at the team's LiteLLM proxy (fronts Z.AI/GLM for per-team
      # virtual-key token tracking) instead of api.z.ai directly.
      - GLM_BASE_URL=${GLM_BASE_URL:-https://litellm.home.zirkler.com/v1}
      - HERMES_DASHBOARD=1
      # Dashboard auth is MANDATORY as of the June 2026 hardening for any
      # non-loopback bind, and the dashboard binds 0.0.0.0 *inside* the
      # container by default (required for -p port publishing to reach it
      # at all — a container-internal 127.0.0.1 bind is NOT reachable via
      # published ports, confirmed from the docs). So even though we only
      # publish to 127.0.0.1 on the HOST side, we still need real auth
      # configured, or the container fails closed at startup. Using the
      # bundled username/password provider (documented as the zero-infra
      # option for a trusted homelab/local box):
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_USERNAME:-damon}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_PASSWORD}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_SECRET}

      # 2026-07-03: ported from the global VS Code MCP config (see
      # config/managed.yaml's mcp_servers block) — each of these is
      # referenced via ${VAR} by one of the new mcp_servers entries there.
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://firecrawl.home.zirkler.com}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - MEMLORD_API_KEY=${MEMLORD_API_KEY}

    volumes:
      # ---------------------------------------------------------------
      # The ENTIRE Hermes data root is one directory: /opt/data (maps to
      # host ~/.hermes/ in the docs' own examples). This replaces the
      # three-way split I originally designed against an invented
      # /home/node/.hermes path structure — Hermes does not expose a
      # granular per-subpath mount contract the way that design assumed.
      # See docs/MOUNTS.md for how the read-only/writable split below is
      # actually achieved within that constraint.
      # ---------------------------------------------------------------
      - ./state/data:/opt/data

      # Managed-scope config (mcp_servers, terminal.cwd/coding_context) —
      # read-only, deep-merged by Hermes over EVERY profile's own
      # config.yaml regardless of which is active (hermes_cli/
      # managed_scope.py, default POSIX path /etc/hermes). This is the
      # ONLY config surface that reaches every Kanban worker profile at
      # once; see config/managed.yaml's header comment for why root
      # config/config.yaml alone isn't enough (each profile is a fully
      # separate HERMES_HOME).
      - ./config/managed.yaml:/etc/hermes/config.yaml:ro

      # Curated (read-only, host-versioned) skills — mounted at a path
      # OUTSIDE /opt/data specifically so it can be read-only without
      # fighting Hermes's own writes to /opt/data/skills (the default,
      # writable, agent-managed skills dir). Referenced via config.yaml's
      # skills.external_dirs (confirmed real key). The OS-level read-only
      # mount is what actually enforces "agent can't rewrite the curated
      # baseline" — Hermes's own docs say external_dirs is not itself a
      # write-protection boundary, so the read-only mount is load-bearing.
      - ./skills:/opt/curated-skills:ro

      # Vendored, version-pinned SpecKit skills (speckit-*), read-only. These
      # are NOT hand-authored — they are generated by SpecKit's own installer
      # at a pinned version (see speckit/SPECKIT_VERSION) via
      # scripts/update-speckit-skills.* and committed to git, so every upgrade
      # is a reviewable diff. bootstrap.* deliberately does NO SpecKit install
      # or network fetch — the skills are already vendored here. Only the
      # skills subtree is mounted; the sibling speckit/.specify/ manifest tree
      # stays host-side (it's what drives the drift check, not a runtime dep).
      # Added to config.yaml skills.external_dirs as /opt/speckit-skills.
      - ./speckit/.claude/skills:/opt/speckit-skills:ro

      # Guardrail hook scripts — read-only for the same reason (agent must
      # not be able to edit its own guardrails). Referenced from
      # config.yaml hooks.pre_tool_call `command` paths.
      - ./hooks:/opt/hooks:ro

      # Tier 3 — target project source, read/write, bind-mount + worktree
      # per task (see docs/MOUNTS.md).
      - ${PROJECT_REPO_PATH}:/workspace/${PROJECT_NAME:-project}

    # 2026-07-04: was /opt/data. Changed so every `docker exec` (and the
    # gateway daemon's own top-level process) starts inside the project
    # repo, not Hermes's data root — needed for ad-hoc `hermes chat`
    # sessions to have real git/repo awareness (coding_context's git
    # snapshot, `git remote -v`, etc.). HERMES_HOME=/opt/data is pinned
    # via its own explicit env var (see `docker exec ... env | grep
    # HERMES_HOME`), not derived from cwd, so this is safe — nothing here
    # reads Hermes's own data relative to cwd; every config.yaml path
    # (skills.external_dirs, hooks.pre_tool_call) is already absolute.
    # Kanban-dispatched workers are unaffected either way — they cd into
    # their own per-task git worktree independently (see docs/MOUNTS.md).
    working_dir: /workspace/${PROJECT_NAME:-project}
    stdin_open: true
    tty: true
