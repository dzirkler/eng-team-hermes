services:
  hermes-agent:
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAME:-eng-team}-hermes
    restart: unless-stopped
    command: gateway run
    # NOTE (corrected 2026-07-02): image is on Docker Hub, NOT ghcr.io — the
    # earlier ghcr.io/nousresearch/hermes-agent reference was wrong and
    # caused "unauthorized" pulling it. Data root is /opt/data, NOT
    # /home/node/.hermes — every mount path below was corrected to match
    # the verified docs at https://hermes-agent.nousresearch.com/docs/user-guide/docker

    shm_size: "1g"   # required for Playwright/browser tools per official docs

    ports:
      - "127.0.0.1:8642:8642"   # gateway / OpenAI-compatible API
      - "127.0.0.1:9119:9119"   # dashboard — see dashboard auth note below

    environment:
      - Z_AI_API_KEY=${Z_AI_API_KEY}
      # Pin the Z.AI base URL explicitly rather than relying solely on each
      # profile's config.yaml `model.base_url`. Confirmed live 2026-07-03:
      # hermes_cli/auth.py's _resolve_zai_base_url() runs a background
      # endpoint auto-probe (global/cn/coding-global/coding-cn) on every
      # agent init, and in observed testing the probe's result won a race
      # against the configured model.base_url in 1 of 4 calls (landing on
      # the wrong, non-coding-plan `open.bigmodel.cn` endpoint even though
      # every profile's config.yaml explicitly set the coding endpoint).
      # GLM_BASE_URL is checked first and short-circuits the probe entirely
      # (`if env_override: return env_override`, before any probing) — this
      # is the reliable way to pin the endpoint, not model.base_url alone.
      - GLM_BASE_URL=${GLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      - HERMES_DASHBOARD=1
      # Dashboard auth is MANDATORY as of the June 2026 hardening for any
      # non-loopback bind, and the dashboard binds 0.0.0.0 *inside* the
      # container by default (required for -p port publishing to reach it
      # at all — a container-internal 127.0.0.1 bind is NOT reachable via
      # published ports, confirmed from the docs). So even though we only
      # publish to 127.0.0.1 on the HOST side, we still need real auth
      # configured, or the container fails closed at startup. Using the
      # bundled username/password provider (documented as the zero-infra
      # option for a trusted homelab/local box):
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_USERNAME:-damon}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_PASSWORD}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_SECRET}

    volumes:
      # ---------------------------------------------------------------
      # The ENTIRE Hermes data root is one directory: /opt/data (maps to
      # host ~/.hermes/ in the docs' own examples). This replaces the
      # three-way split I originally designed against an invented
      # /home/node/.hermes path structure — Hermes does not expose a
      # granular per-subpath mount contract the way that design assumed.
      # See docs/MOUNTS.md for how the read-only/writable split below is
      # actually achieved within that constraint.
      # ---------------------------------------------------------------
      - ./state/data:/opt/data

      # Curated (read-only, host-versioned) skills — mounted at a path
      # OUTSIDE /opt/data specifically so it can be read-only without
      # fighting Hermes's own writes to /opt/data/skills (the default,
      # writable, agent-managed skills dir). Referenced via config.yaml's
      # skills.external_dirs (confirmed real key). The OS-level read-only
      # mount is what actually enforces "agent can't rewrite the curated
      # baseline" — Hermes's own docs say external_dirs is not itself a
      # write-protection boundary, so the read-only mount is load-bearing.
      - ./skills:/opt/curated-skills:ro

      # Guardrail hook scripts — read-only for the same reason (agent must
      # not be able to edit its own guardrails). Referenced from
      # config.yaml hooks.pre_tool_call `command` paths.
      - ./hooks:/opt/hooks:ro

      # Tier 3 — target project source, read/write, bind-mount + worktree
      # per task (see docs/MOUNTS.md).
      - ${PROJECT_REPO_PATH}:/workspace/${PROJECT_NAME:-project}

    working_dir: /opt/data
    stdin_open: true
    tty: true
