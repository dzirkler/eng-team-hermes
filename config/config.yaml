# Hermes Agent config.yaml — versioned source of truth for the DEFAULT
# profile (root /opt/data, the always-on process docker-compose.yml starts
# via `command: gateway run`). Seeded into ./state/data/config.yaml by
# bootstrap.ps1 / bootstrap.sh before `docker compose up` — NOT a live bind
# mount. Hermes migrates/rewrites config.yaml in place on every schema
# version bump (confirmed: a fresh container backs up and rewrites it even
# on first boot), which would fight a read-only bind mount. Re-run
# bootstrap to re-sync this file into the container; a running container
# will not pick up host edits to this file until the next bootstrap run.
#
# Schema confirmed 2026-07-02 by reading hermes_cli/config.py directly
# inside a live container (docker exec ... cat /opt/hermes/hermes_cli/config.py)
# — not from docs. Keys that looked plausible from docs but do not actually
# exist in the schema (top-level `profile:`, `dashboard.bind`/`port`,
# `gateway.enabled`, `kanban.board`, `kanban.default_workspace`) have been
# removed. Board/workspace selection and per-worker profile creation are
# CLI-imperative operations run by bootstrap.ps1/.sh, not declarative config
# — see docs/temp/handoff-2026-07-02.md for the full resolution writeup.

# Concurrency cap for THIS team's gateway. `max_concurrent_sessions` is a
# global active-session slot cap (file-locked lease registry) across the
# interactive orchestrator + every kanban worker the dispatcher spawns —
# confirmed in hermes_cli/active_sessions.py + config.py (default None =
# unbounded; at cap the dispatcher just defers spawning to the next tick, it
# does not error). It is PER-TEAM: each team's container has its own lease
# registry, so this does NOT coordinate across the two teams you run
# concurrently.
#
# IMPORTANT — this bounds burst/infra, NOT your GLM spend. The GLM Coding Plan
# limit is a PROMPT BUDGET per rolling 5h window (Pro ≈ 400 prompts/5h, burned
# 2–3x peak/off-peak), not a concurrency limit. Parallel vs. serial costs the
# same total prompts; parallel just burns the shared budget faster. Both teams
# draw from ONE Coding Plan pool via the LiteLLM proxy, so the real cross-team
# ceiling belongs at LiteLLM (per-virtual-key RPM/budget), not here. This value
# just keeps one team from thundering-herd on the proxy/container. 3 → up to
# ~6 concurrent workers across your two teams; raise if the proxy + budget have
# headroom, lower if you see 5h-window hard-stops mid-feature. NOTE
# (2026-07-04): implementation-engineer was raised from GLM-4.7 (cheap tier)
# to flagship GLM-5.2 to match senior-engineer, so the high-volume Implement
# workers no longer stretch the budget the way they used to — all engineer
# traffic now draws from the same flagship pricing. Watch for 5h-window
# hard-stops and lower this if the shared Coding Plan pool gets tight.
max_concurrent_sessions: 3

model:
  provider: zai
  # Confirmed real: "zai" is a canonical provider slug and "glm-5.2" is a
  # listed model id for it (hermes_cli/models.py PROVIDER_MODELS["zai"]).
  default: glm-5.2
  # NOTE: this field is decorative for the built-in "zai" provider — Hermes
  # NEVER reads model.api_key_env at runtime for it. Confirmed two ways:
  # (1) reading hermes_cli/auth.py's resolve_api_key_provider_credentials(),
  # which resolves the key purely from PROVIDER_REGISTRY["zai"]'s hardcoded
  # api_key_env_vars tuple (GLM_API_KEY, ZAI_API_KEY, Z_AI_API_KEY, in that
  # priority order) — this config value is never consulted; (2) a live test
  # 2026-07-03: pointing this field at a nonexistent env var didn't break
  # anything, the call still succeeded via Z_AI_API_KEY. The actual key in
  # use is whichever of those three env vars is set container-wide (see
  # docker-compose.yml) — currently GLM_API_KEY (checked first), holding
  # the team's LiteLLM virtual key. Left as Z_AI_API_KEY here only so this
  # file documents *a* valid value, not because Hermes reads it.
  api_key_env: Z_AI_API_KEY
  # Endpoint (2026-07-03): routed through the team's LiteLLM proxy for
  # per-team token-usage tracking via virtual keys, not directly at Z.AI's
  # Coding Plan endpoint anymore (see docs/temp/V3-Supplement-Model-and-Key-Binding.md
  # §9 for the full writeup). `model.base_url` here does correctly take
  # precedence over the provider's built-in default when model.provider
  # matches (confirmed in hermes_cli/runtime_provider.py's generic
  # API-key-provider branch) — but the actually load-bearing pin is the
  # GLM_BASE_URL env var in docker-compose.yml, which also eliminates a
  # background auto-probe race (see that file's comment). Keep this in
  # sync with GLM_BASE_URL as documentation, but don't rely on this field
  # alone.
  base_url: https://litellm.home.zirkler.com/v1

kanban:
  dispatch_interval_seconds: 60
  # Board slug + default workspace are NOT config.yaml keys — they're set
  # imperatively via `hermes kanban boards create/switch/set-default-workdir`,
  # which bootstrap.ps1/.sh run on every invocation (idempotent).

skills:
  # Curated (Tier 1, read-only, human-authored) skills — ported 1:1 from
  # D:\code\eng-team-plugin\skills\, mounted read-only at /opt/curated-skills
  # (see docker-compose.yml). Agent-authored skills land in the writable
  # Tier-2 default skills dir instead, kept structurally separate from the
  # curated baseline.
  #
  # /opt/speckit-skills — the version-pinned, SpecKit-generated speckit-*
  # skills, vendored under speckit/ and mounted read-only (see
  # docker-compose.yml + speckit/README.md). Kept in a SEPARATE external dir
  # (not co-mingled into /opt/curated-skills) so the generated baseline stays
  # visibly distinct from hand-authored skills and can be regenerated wholesale
  # by scripts/update-speckit-skills.* without touching curated content.
  external_dirs:
    - /opt/curated-skills
    - /opt/speckit-skills
  write_approval: true

# mcp_servers and terminal (cwd/coding_context) moved 2026-07-04 to
# config/managed.yaml, bind-mounted read-only at /etc/hermes/config.yaml.
# Hermes's managed-scope layer deep-merges that file over EVERY profile's
# config regardless of which one is active; a key set only here (the root/
# default profile's config.yaml) is invisible to every other profile, since
# `hermes profile use <name>` repoints HERMES_HOME at a fully separate
# /opt/data/profiles/<name>/config.yaml. See managed.yaml's header comment
# for the full writeup (confirmed live: `hermes mcp list` showed zero
# servers once a non-default profile was active, despite this file listing
# 10).

hooks:
  # hooks.<event> must be a list of {command, matcher?, timeout?} mappings —
  # a bare string entry is silently dropped with a logged warning and never
  # registers (confirmed: agent/shell_hooks.py _parse_single_entry rejects
  # non-dict entries). The previous version of this file used bare strings
  # and the hook never actually fired.
  pre_tool_call:
    - command: /opt/hooks/no_merge_guard.js
      timeout: 10
